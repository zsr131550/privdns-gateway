#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 (inet filter, policy drop)。install.sh 渲染占位符:
#   __SSH_PORT__      SSH 端口 (跟 sshd 的 Port 一致, 否则一应用即锁死)
#   __INTERNAL_CIDR__ 内网卡来源段
# 暴露面: 对全网只留 SSH; 853(DoT)/53/80/443/81 一律只放行内网卡来源。
# (53 对全网开放=开放解析器/DNS 放大滥用面; 手机走 DoT 不需要明文 53。本机自身 DNS 走 lo 不受影响。)
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        tcp dport { __SSH_PORT__ } accept
        ip saddr __INTERNAL_CIDR__ tcp dport { 53, 80, 81, 443, 853 } accept
        ip saddr __INTERNAL_CIDR__ udp dport { 53, 443 } accept
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
    chain forward { type filter hook forward priority 0; policy accept; }
    chain output  { type filter hook output  priority 0; policy accept; }
}
